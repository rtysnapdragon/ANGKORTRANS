<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AngkorTrans API</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0f172a;
    --card: #111827;
    --accent: #6366f1;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --success: #10b981;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: var(--text);
}

/* Layout */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 60px 20px;
}

/* Header */
.logo {
    font-size: 2.8rem;
    font-weight: 600;
    letter-spacing: 1px;
}

.tagline {
    color: var(--muted);
    margin-top: 8px;
}

/* Status Cards */
.status-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 40px;
}

.card {
    background: var(--card);
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 6px;
}

.value {
    font-size: 1.2rem;
    font-weight: 600;
}

.online {
    color: var(--success);
}

/* Time */
.time {
    margin-top: 20px;
    font-family: monospace;
    color: var(--accent);
}

/* Button */
.btn {
    display: inline-block;
    margin-top: 50px;
    padding: 14px 30px;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    opacity: 0.85;
}

.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    filter: brightness(0.6);
    z-index: -1;
    opacity: 0.7;
    scale: 1.1;
    inset: 0;
}

/* Footer */
footer {
    margin-top: 80px;
    color: var(--muted);
    font-size: 0.85rem;
}
</style>

</head>

<body>

<div class="container">
<!-- BACKGROUND -->
<div class="background"
     style="background-image: url('https://images.unsplash.com/photo-1639322537228-f710d846310a?q=80&w=1920&auto=format&fit=crop');">
</div>
<h1 class="logo">AngkorTrans</h1>
<p class="tagline">Modern Translation API</p>

<div class="status-grid">
    <div class="card">
        <div class="label">API STATUS</div>
        <div class="value online">● Online</div>
    </div>

    <div class="card">
        <div class="label">SERVER TIME</div>
        <div class="value" id="live-time"></div>
    </div>

    <div class="card">
        <div class="label">API VERSION</div>
        <div class="value">{{ api_version }}</div>
    </div>

    <div class="card">
        <div class="label">DJANGO</div>
        <div class="value">{{ django_version }}</div>
    </div>

    <div class="card">
        <div class="label">PYTHON</div>
        <div class="value">{{ python_version }}</div>
    </div>
</div>

<a href="/docs" class="btn">Open API Docs →</a>

<footer>
    <p>© 2026 AngkorTrans • Phnom Penh</p>
</footer>
</div>

<script>
function updateTime() {
    const now = new Date();
    document.getElementById('live-time').textContent =
        now.toLocaleString();
}

setInterval(updateTime, 1000);
updateTime();
</script>

</body>
</html>
